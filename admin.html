<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayaGuru Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* TEMA HITAM PUTIH MINIMALIS */
            --bg: #ffffff;
            --surface: #ffffff;
            --text: #000000;
            --text-muted: #666666;
            --border: #e5e5e5;
            --primary: #000000; /* Hitam untuk tombol utama */
            --danger: #000000;  /* Hitam untuk tombol hapus (sesuai tema) */
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; font-weight: 600; letter-spacing: -0.5px; }

        /* Login Card */
        #login-card { 
            background: var(--surface); padding: 2rem; border-radius: 0; 
            border: 1px solid var(--border); text-align: center; 
        }
        
        /* Dashboard */
        #dashboard { display: none; }
        
        /* Input & Form Styling Minimalis */
        .card { 
            background: var(--surface); padding: 1.5rem; border-radius: 0; 
            border: 1px solid var(--border); margin-bottom: 1.5rem; 
        }
        
        input { 
            width: 100%; padding: 12px; margin-bottom: 12px; 
            border: 1px solid var(--border); border-radius: 0; 
            font-size: 1rem; -webkit-appearance: none; background: #fff;
            color: #000;
        }
        input:focus { outline: 1px solid var(--primary); border-color: var(--primary); }

        /* Tombol Minimalis */
        .btn { 
            width: 100%; padding: 12px; border: 1px solid var(--primary);
            background: var(--primary); color: white; 
            font-weight: 500; cursor: pointer; transition: all 0.2s; border-radius: 0; font-size: 0.9rem;
        }
        .btn:hover { background: #333; border-color: #333; }
        
        .btn-outline { 
            background: transparent; color: var(--primary); margin-top: 10px;
        }
        .btn-outline:hover { background: #f9f9f9; }

        .btn-sm { 
            padding: 8px 16px; font-size: 0.8rem; width: auto; 
            display: inline-block; margin-right: 8px; margin-bottom: 5px;
        }
        
        /* List Links Minimalis */
        .link-item { 
            display: flex; flex-direction: column; gap: 10px; 
            padding: 15px 0; border-bottom: 1px solid var(--border); 
        }
        .link-item:last-child { border-bottom: none; }
        
        .short-code { font-weight: 700; color: var(--text); font-size: 1.1rem; }
        .long-url { color: var(--text-muted); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .meta { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .actions { display: flex; flex-wrap: wrap; gap: 0; margin-top: 5px; }

        /* Loading */
        .loading { text-align: center; padding: 20px; display: none; font-style: italic; color: var(--text-muted); }
        
        /* QR Modal */
        #qr-modal { 
            display: none; position: fixed; top:0; left:0; right:0; bottom:0; 
            background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; 
        }
        .qr-box { background: white; padding: 30px; border-radius: 0; text-align: center; max-width: 90%; }
        .qr-box img { width: 200px; height: 200px; margin: 20px 0; mix-blend-mode: multiply; }
    </style>
</head>
<body>

<div class="container">
    <h1>LINK MANAGER</h1>

    <!-- Login View -->
    <div id="login-view">
        <div id="login-card">
            <h3 style="margin-bottom: 20px;">ADMIN LOGIN</h3>
            <form id="login-form">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn">MASUK</button>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard">
        <!-- Create Form -->
        <div class="card">
            <h3 style="margin-bottom: 15px; font-size: 1rem; text-transform: uppercase;">Buat Link Baru</h3>
            <form id="create-form">
                <input type="url" id="longUrl" placeholder="URL Tujuan (https://...)" required>
                <input type="text" id="shortCode" placeholder="Kode Pendek (cth: yt, shopee)">
                <button type="submit" class="btn">SIMPAN</button>
            </form>
        </div>

        <!-- List -->
        <div class="card">
            <h3 style="margin-bottom: 15px; font-size: 1rem; text-transform: uppercase;">Daftar Link</h3>
            <div id="loading" class="loading">Memuat data...</div>
            <div id="link-list"></div>
        </div>

        <button onclick="logout()" class="btn btn-outline" style="width:100%">KELUAR</button>
    </div>
</div>

<!-- QR Modal -->
<div id="qr-modal">
    <div class="qr-box">
        <h3 id="qr-title" style="font-size: 1.1rem; margin-bottom: 10px;">QR CODE</h3>
        <img id="qr-img" src="" alt="QR">
        <br><br>
        <a id="qr-download" href="#" download="qrcode.png" class="btn btn-sm">DOWNLOAD</a>
        <button onclick="document.getElementById('qr-modal').style.display='none'" class="btn btn-sm btn-outline">TUTUP</button>
    </div>
</div>

<script>
    // URL WEB APP ANDA (Sudah disertakan dari kode Anda)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5FAs-sXVqrCu-4XvNBJVE6jP4oCndAMhNQAUEADRCJYR3xi4FgxAGgxZI_un9EmbPLg/exec'; 
    
    const AUTH_KEY = 'sayaguru_logged_in';

    function checkAuth() {
        if (localStorage.getItem(AUTH_KEY) === 'true') {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadLinks();
        }
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const pass = document.getElementById('password').value;
        if (pass === 'admin123') { 
            localStorage.setItem(AUTH_KEY, 'true');
            checkAuth();
        } else {
            alert('Password salah!');
        }
    });

    function logout() {
        localStorage.removeItem(AUTH_KEY);
        location.reload();
    }

    async function loadLinks() {
        const list = document.getElementById('link-list');
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        list.innerHTML = '';

        try {
            const res = await fetch(SCRIPT_URL + '?action=read');
            const response = await res.json();
            
            let links = [];
            if (response.status === 'success' && Array.isArray(response.data)) {
                links = response.data;
            }

            if (links.length > 0) {
                links.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                links.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'link-item';
                    div.innerHTML = `
                        <div>
                            <div class="short-code">go.sayaguru.id/${item.shortCode}</div>
                            <div class="long-url" title="${item.longUrl}">${item.longUrl}</div>
                        </div>
                        <div class="meta">
                            <span>${item.clicks || 0} KLIK</span>
                            <span>${new Date(item.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="actions">
                            <!-- Tombol Baru: Langsung ke Link Tujuan -->
                            <button class="btn btn-sm" onclick="window.open('${item.longUrl}', '_blank')">LINK</button>
                            
                            <button class="btn btn-sm btn-outline" onclick="copyLink('${item.shortCode}')">COPY</button>
                            <button class="btn btn-sm btn-outline" onclick="showQR('${item.shortCode}')">QR</button>
                            <button class="btn btn-sm btn-outline" style="color: var(--text); border-color: var(--border);" onclick="deleteLink('${item.id}')">HAPUS</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = '<p style="text-align:center; color:#999; padding: 20px;">Belum ada link.</p>';
            }
        } catch (err) {
            console.error(err);
            list.innerHTML = '<p style="text-align:center; color:#000; padding: 20px;">Gagal memuat data.</p>';
        }
        loading.style.display = 'none';
    }

    document.getElementById('create-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'MENYIMPAN...';
        btn.disabled = true;

        const payload = {
            action: 'create',
            shortCode: document.getElementById('shortCode').value.trim(),
            longUrl: document.getElementById('longUrl').value.trim()
        };

        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            
            if (result.status === 'success') {
                document.getElementById('create-form').reset();
                loadLinks();
            } else {
                alert('Error: ' + result.message);
            }
        } catch (err) {
            alert('Koneksi gagal.');
        }

        btn.innerText = originalText;
        btn.disabled = false;
    });

    async function deleteLink(id) {
        if (!confirm('Hapus link ini?')) return;
        
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id })
            });
            const result = await res.json();
            if (result.status === 'success') loadLinks();
        } catch (err) { alert('Gagal menghapus'); }
    }

    function copyLink(code) {
        navigator.clipboard.writeText('https://go.sayaguru.id/' + code);
        alert('Link disalin!');
    }

    function showQR(code) {
        const url = `https://go.sayaguru.id/${code}`;
        document.getElementById('qr-title').innerText = `QR: /${code}`;
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
        document.getElementById('qr-download').href = document.getElementById('qr-img').src;
        document.getElementById('qr-modal').style.display = 'flex';
    }

    checkAuth();
</script>
</body>
</html>
