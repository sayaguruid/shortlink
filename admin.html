<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayaGuru Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }

        /* Login */
        #login-card { background: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; }
        
        /* Dashboard */
        #dashboard { display: none; }
        
        .card { background: var(--surface); padding: 1.5rem; border-radius: 12px; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        
        input { 
            width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; 
            font-size: 1rem; -webkit-appearance: none; 
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }

        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); 
            color: white; font-weight: 600; cursor: pointer; transition: 0.2s; 
        }
        .btn:hover { background: #1d4ed8; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 10px;}
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; width: auto; display: inline-block; margin-right: 5px; }
        .btn-danger { background: var(--danger); }

        /* List Links */
        .link-item { 
            display: flex; flex-direction: column; gap: 8px; 
            padding: 12px; border-bottom: 1px solid var(--border); 
        }
        .link-item:last-child { border-bottom: none; }
        
        .short-code { font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        .long-url { color: #6b7280; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { font-size: 0.8rem; color: #9ca3af; display: flex; justify-content: space-between; align-items: center; }
        .actions { display: flex; gap: 8px; margin-top: 5px; }

        /* Loading */
        .loading { text-align: center; padding: 20px; display: none; }
        
        /* QR Modal */
        #qr-modal { 
            display: none; position: fixed; top:0; left:0; right:0; bottom:0; 
            background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center; 
        }
        .qr-box { background: white; padding: 20px; border-radius: 12px; text-align: center; max-width: 90%; }
        .qr-box img { width: 200px; height: 200px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>SayaGuru Link Manager</h1>

    <!-- Login View -->
    <div id="login-view">
        <div id="login-card">
            <h3>Admin Login</h3>
            <p style="margin-bottom: 15px; color:#666; font-size: 0.9rem;">Masuk untuk mengelola link</p>
            <form id="login-form">
                <input type="password" id="password" placeholder="Password Admin" required>
                <button type="submit" class="btn">Masuk</button>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard">
        <!-- Create Form -->
        <div class="card">
            <h3 style="margin-bottom: 10px;">Buat Link Baru</h3>
            <form id="create-form">
                <input type="url" id="longUrl" placeholder="Link Tujuan (https://...)" required>
                <input type="text" id="shortCode" placeholder="Kode Pendek (cth: yt, promo)">
                <button type="submit" class="btn">Simpan Link</button>
            </form>
        </div>

        <!-- List -->
        <div class="card">
            <h3 style="margin-bottom: 10px;">Daftar Link</h3>
            <div id="loading" class="loading">Memuat data...</div>
            <div id="link-list"></div>
        </div>

        <button onclick="logout()" class="btn btn-outline" style="width:100%">Keluar</button>
    </div>
</div>

<!-- QR Modal -->
<div id="qr-modal">
    <div class="qr-box">
        <h3 id="qr-title">QR Code</h3>
        <img id="qr-img" src="" alt="QR">
        <br>
        <a id="qr-download" href="#" download="qrcode.png" class="btn btn-sm">Download</a>
        <button onclick="document.getElementById('qr-modal').style.display='none'" class="btn btn-sm btn-outline">Tutup</button>
    </div>
</div>

<script>
    // GANTI INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby5FAs-sXVqrCu-4XvNBJVE6jP4oCndAMhNQAUEADRCJYR3xi4FgxAGgxZI_un9EmbPLg/exec'; 
    
    // State Sederhana
    const AUTH_KEY = 'sayaguru_logged_in';

    // Cek Login
    function checkAuth() {
        if (localStorage.getItem(AUTH_KEY) === 'true') {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadLinks();
        }
    }

    // Login Logic
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const pass = document.getElementById('password').value;
        if (pass === 'admin123') { 
            localStorage.setItem(AUTH_KEY, 'true');
            checkAuth();
        } else {
            alert('Password salah!');
        }
    });

    function logout() {
        localStorage.removeItem(AUTH_KEY);
        location.reload();
    }

    // --- PERBAIKAN: Load Data (Sesuaikan dengan format respons JSON baru) ---
    async function loadLinks() {
        const list = document.getElementById('link-list');
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        list.innerHTML = '';

        try {
            const res = await fetch(SCRIPT_URL + '?action=read');
            const response = await res.json();
            
            // Cek apakah status success dan apakah datanya adalah array
            let links = [];
            if (response.status === 'success' && Array.isArray(response.data)) {
                links = response.data;
            }

            if (links.length > 0) {
                // Urutkan dari yang terbaru
                links.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                links.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'link-item';
                    div.innerHTML = `
                        <div>
                            <div class="short-code">go.sayaguru.id/${item.shortCode}</div>
                            <div class="long-url" title="${item.longUrl}">${item.longUrl}</div>
                        </div>
                        <div class="meta">
                            <span>👁 ${item.clicks || 0} klik</span>
                            <span>${new Date(item.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="actions">
                            <button class="btn btn-sm" onclick="copyLink('${item.shortCode}')">Copy</button>
                            <button class="btn btn-sm" onclick="showQR('${item.shortCode}')">QR</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteLink('${item.id}')">Hapus</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = '<p style="text-align:center; color:#999; padding: 20px;">Belum ada link tersimpan.</p>';
            }
        } catch (err) {
            console.error(err);
            list.innerHTML = '<p style="text-align:center; color:red; padding: 20px;">Gagal memuat data. Periksa koneksi internet.</p>';
        }
        loading.style.display = 'none';
    }

    // Create Link
    document.getElementById('create-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'Menyimpan...';
        btn.disabled = true;

        const payload = {
            action: 'create',
            shortCode: document.getElementById('shortCode').value.trim(),
            longUrl: document.getElementById('longUrl').value.trim()
        };

        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            
            if (result.status === 'success') {
                alert('Link berhasil dibuat!');
                document.getElementById('create-form').reset();
                loadLinks(); // Refresh list
            } else {
                alert('Error: ' + result.message);
            }
        } catch (err) {
            alert('Terjadi kesalahan koneksi.');
            console.error(err);
        }

        btn.innerText = originalText;
        btn.disabled = false;
    });

    // Delete Link
    async function deleteLink(id) {
        if (!confirm('Hapus link ini?')) return;
        
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id })
            });
            const result = await res.json();
            if (result.status === 'success') loadLinks();
        } catch (err) { alert('Gagal menghapus'); }
    }

    // Utils
    function copyLink(code) {
        navigator.clipboard.writeText('https://go.sayaguru.id/' + code);
        alert('Link disalin!');
    }

    function showQR(code) {
        const url = `https://go.sayaguru.id/${code}`;
        document.getElementById('qr-title').innerText = `QR: /${code}`;
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
        document.getElementById('qr-download').href = document.getElementById('qr-img').src;
        document.getElementById('qr-modal').style.display = 'flex';
    }

    // Init
    checkAuth();
</script>
</body>
</html>
