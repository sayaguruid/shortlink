<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayaguru.id</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-body: #f9fafb;
            --bg-card: #ffffff;
            --text-main: #111111;
            --text-sub: #666666;
            --border-color: #e5e5e5;
            --radius: 16px;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 580px;
            margin-top: 1rem;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            flex: 1;
        }

        .hero {
            text-align: center;
            background: var(--bg-card);
            padding: 2.2rem 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .hero-img {
            width: 75px; height: 75px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 2px solid var(--border-color);
            padding: 3px;
        }

        .hero h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.6rem; line-height: 1.4; }
        .hero p { font-size: 0.85rem; color: var(--text-sub); line-height: 1.6; font-weight: 300; }
        .direction { text-align: center; font-size: 0.75rem; color: var(--text-sub); margin-top: -10px; }

        .section-title {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-sub); font-weight: 600; margin-bottom: 1rem;
            margin-left: 0.5rem; opacity: 0.7;
        }

        .link-list { display: flex; flex-direction: column; gap: 1rem; }

        .link-card {
            background: var(--bg-card);
            padding: 1.1rem 1.3rem;
            border-radius: var(--radius);
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid transparent;
            transition: all 0.25s ease;
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInUp 0.35s ease forwards;
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--text-main);
            box-shadow: 0 10px 20px rgba(0,0,0,0.06);
        }

        .link-icon-wrapper {
            width: 42px; height: 42px;
            background: #f2f2f2; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0;
            transition: all 0.25s ease;
        }

        .link-card:hover .link-icon-wrapper { background: #111; color: #fff; }
        .link-content { flex: 1; min-width: 0; }
        .link-title { font-weight: 500; font-size: 0.95rem; margin-bottom: 2px; }
        .link-desc { font-size: 0.75rem; color: var(--text-sub); }
        .link-action { font-size: 1.2rem; color: var(--text-sub); flex-shrink: 0; }

        footer { margin-top: auto; padding: 2rem 1rem; text-align: center; }
        footer p { font-size: 0.7rem; color: #999; }
    </style>
</head>

<body>

<div class="container">
    <section class="hero">
        <img src="https://i.imgur.com/NqyBFzP.png" class="hero-img" alt="Sayaguru">
        <h1>Guru capek kerja, tapi penghasilan segitu aja?</h1>
        <p>Saya bantu kamu berkembang, bukan cuma bertahan. Mulai dari skill, konten, sampai penghasilan tambahan.</p>
    </section>

    <div class="direction">↓ Pilih langkah kamu di bawah ini</div>

    <div>
        <div class="section-title">Mulai dari sini</div>
        <div id="link-container" class="link-list"></div>
    </div>
</div>

<footer><p>&copy; Sayaguru.id</p></footer>

<script>
// ⚠️ GANTI dengan URL deployment kamu
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4XAJ857b16cy1fFv1RELgS4ZMQr3pkkWzdq4M961-CuPkSWtYupYk4Sl1B1y0yzZnJQ/exec';
var CACHE_KEY = 'sayaguru_cache';
var linkContainer = document.getElementById('link-container');

// ============================================================
// FALLBACK — data cadangan, langsung di HTML
// Ini yang bikin loading INSTAN meski pertama kali buka
//
// ⚠️ Isi sesuai produk awal kamu.
//    Setelah kunjungan pertama, data akan otomatis diganti
//    oleh data terbaru dari spreadsheet (via cache).
// ============================================================
var FALLBACK = [
    { title: 'Belajar Nulis yang Menghasilkan', url: 'https://go.sayaguru.id/iw', icon: 'quill-pen-line', desc: 'Skill yang saya pakai untuk mulai berkembang' },
    { title: 'Ruang Cerita Guru', url: 'http://go.sayaguru.id/rcg', icon: 'user-voice-line', desc: 'Karena tidak semua guru punya tempat untuk cerita, di sini kamu tidak sendirian.' },
    { title: 'Komunitas Guru Produktif', url: '#', icon: 'group-line', desc: 'Networking eksklusif antar guru' },
    { title: 'Panduan Side Income Guru', url: '#', icon: 'book-open-line', desc: 'E-book penghasilan tambahan untuk guru' },
    { title: 'Konsultasi Bisnis Guru', url: '#', icon: 'chat-check-line', desc: 'Coaching 1-on-1 monetisasi skill' },
    { title: 'Tutorial YouTube untuk Guru', url: '#', icon: 'youtube-line', desc: 'Bangun channel YouTube dari nol' }
];

// --- Render ---
function renderLinks(links) {
    linkContainer.innerHTML = '';
    links.forEach(function(link, i) {
        var card = document.createElement('a');
        card.className = 'link-card';
        card.style.animationDelay = (i * 0.05) + 's';
        card.href = link.url || '#';
        if (link.url && link.url !== '#') { card.target = '_blank'; card.rel = 'noopener'; }

        card.innerHTML =
            '<div class="link-icon-wrapper"><i class="ri-' + (link.icon || 'link') + '"></i></div>' +
            '<div class="link-content">' +
                '<div class="link-title">' + link.title + '</div>' +
                (link.desc ? '<div class="link-desc">' + link.desc + '</div>' : '') +
            '</div>' +
            '<div class="link-action"><i class="ri-arrow-right-s-line"></i></div>';

        linkContainer.appendChild(card);
    });
}

// --- Cari data tercepat yang tersedia ---
var initialData = FALLBACK;
try {
    var cached = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (cached && cached.length > 0) initialData = cached;
} catch(e) {}

// LANGSUNG TAMPIL — tidak ada spinner, tidak ada tunggu
renderLinks(initialData);

// --- Sync dari spreadsheet di background (sunyi, tanpa spinner) ---
fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(fresh) {
        localStorage.setItem(CACHE_KEY, JSON.stringify(fresh));
        // Re-render kalau datanya beda (produk baru, URL berubah, dll)
        if (JSON.stringify(initialData) !== JSON.stringify(fresh)) {
            renderLinks(fresh);
        }
    })
    .catch(function() {
        // Gagal fetch? Tidak apa-apa — fallback/cache sudah tampil
    });
</script>

</body>
</html>
