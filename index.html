<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect</title>
</head>

<body>

Redirecting...

<script>

const api="https://script.google.com/macros/s/AKfycbzTdSCtEI-wgCQPJo4lsWPfJYGcVL2fNRV3SLA8Pd_W-287wQYIZC5VZo6IgCyqdgoIeA/exec";

const path=window.location.pathname.slice(1);

if(path){

fetch("https://ipapi.co/json")
.then(r=>r.json())
.then(data=>{

fetch(`${api}?link=${path}&country=${data.country_name}&ip=${data.ip}`)
.then(r=>r.text())
.then(url=>{

if(url!="404"){
location.replace(url);
}else{
document.body.innerHTML="Link tidak ditemukan";
}

});

});

}

</script>

</body>
</html>
