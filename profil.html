<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Palette Modern Emerald & Slate */
            --primary: #0f172a;
            --primary-light: #334155;
            --accent: #10b981;
            --accent-dark: #059669;
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
            --text-body: #475569;
            --border-light: #e2e8f0;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-body);
            line-height: 1.7;
            padding: 40px 20px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            background: #ffffff;
            padding: 48px 40px 32px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #f1f5f9;
            border: 5px solid white;
            box-shadow: var(--shadow-md);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .profile-photo:hover { transform: scale(1.05); }
        .profile-photo img { width: 100%; height: 100%; object-fit: cover; }

        .header h1 { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .header h2 { font-size: 14px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 24px; }

        .contact-bar { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .contact-chip {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: #f8fafc; border: 1px solid var(--border-light);
            border-radius: 9999px; font-size: 13px; font-weight: 500;
            color: var(--primary-light); text-decoration: none; transition: all 0.2s;
        }
        .contact-chip:hover { border-color: var(--accent); color: var(--accent); background: #ecfdf5; transform: translateY(-1px); }
        .contact-chip i { font-size: 14px; color: var(--accent); }

        /* Main */
        .main { padding: 40px; }
        @media (min-width: 768px) { .main { padding: 40px 60px; } }

        .section { margin-bottom: 50px; }

        .section-title {
            font-size: 12px; font-weight: 800; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 24px;
            display: flex; align-items: center; gap: 12px;
            padding-bottom: 12px; border-bottom: 2px solid #f1f5f9;
        }
        .section-title i {
            background: #ecfdf5; color: var(--accent);
            width: 28px; height: 28px; display: flex; align-items: center;
            justify-content: center; border-radius: 8px; font-size: 12px;
        }

        /* About */
        .about-text {
            font-size: 14px; color: var(--text-body); text-align: justify;
            background: #f8fafc; padding: 24px; border-radius: var(--radius-md);
            border-left: 4px solid var(--accent); white-space: pre-line;
        }

        /* --- CIRCULAR SKILLS (NEW) --- */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 30px;
            justify-items: center;
        }

        .skill-item-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .skill-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #e2e8f0; /* Fallback color */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            /* Transition untuk animasi loading */
            transition: background 1.5s ease-out;
        }

        /* Lingkaran dalam (berwarna putih untuk efek donat) */
        .skill-circle::before {
            content: '';
            position: absolute;
            width: 72px;
            height: 72px;
            background: var(--bg-card); /* Warna harus sama dengan background kartu */
            border-radius: 50%;
            z-index: 1;
        }

        /* Teks Persentase di tengah */
        .skill-circle span {
            position: relative;
            z-index: 2;
            font-size: 14px;
            font-weight: 800;
            color: var(--accent);
        }

        .skill-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            line-height: 1.4;
        }

        /* Timeline & Sections (Same as before) */
        .timeline-item {
            position: relative; padding-left: 24px; margin-bottom: 24px;
            border-left: 2px solid #f1f5f9;
        }
        .timeline-item:last-child { margin-bottom: 0; border-left-color: transparent; }
        .timeline-item::before {
            content: ''; position: absolute; left: -6px; top: 6px;
            width: 10px; height: 10px; border-radius: 50%;
            background: white; border: 2px solid var(--accent);
        }
        .timeline-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; flex-wrap: wrap; }
        .timeline-title { font-size: 15px; font-weight: 700; color: var(--primary); }
        .timeline-date {
            font-size: 11px; font-weight: 700; color: white; background: var(--primary-light);
            padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .timeline-subtitle { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
        .timeline-desc { font-size: 13px; color: var(--text-body); }
        .timeline-desc ul { list-style-type: none; margin-top: 8px; }
        .timeline-desc li { position: relative; padding-left: 18px; margin-bottom: 4px; }
        .timeline-desc li::before { content: '•'; color: var(--accent); font-weight: bold; position: absolute; left: 0; }

        /* Accordion */
        .cert-item { border: 1px solid var(--border-light); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; background: white; }
        .cert-btn {
            width: 100%; background: white; border: none; padding: 16px 20px;
            text-align: left; font-size: 13px; font-weight: 600; color: var(--primary);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .cert-btn:hover { background: #f8fafc; color: var(--accent); }
        .cert-btn.active { background: var(--primary); color: white; }
        .cert-arrow { font-size: 10px; transition: transform 0.3s; color: var(--accent); }
        .cert-btn.active .cert-arrow { transform: rotate(180deg); color: white; }
        .cert-content { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0, 1, 0, 1); background: #f8fafc; }
        .cert-inner { padding: 20px; font-size: 13px; color: var(--text-body); border-top: 1px solid var(--border-light); }
        .cert-row { display: flex; margin-bottom: 6px; }
        .cert-label { font-weight: 600; color: var(--primary); min-width: 100px; flex-shrink: 0; }
        .cert-link {
            display: inline-flex; align-items: center; gap: 8px; margin-top: 12px;
            padding: 8px 16px; background: var(--accent); color: white;
            text-decoration: none; border-radius: 8px; font-size: 12px; font-weight: 600;
        }
        .cert-link:hover { background: var(--accent-dark); }

        /* Education Grid */
        .edu-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 600px) { .edu-grid { grid-template-columns: repeat(2, 1fr); } }
        .edu-card { background: #f8fafc; padding: 20px; border-radius: var(--radius-md); border: 1px solid transparent; transition: all 0.2s; }
        .edu-card:hover { border-color: var(--accent); background: white; box-shadow: var(--shadow-sm); }
        .edu-year {
            font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase;
            margin-bottom: 6px; display: inline-block; background: #ecfdf5; padding: 2px 8px; border-radius: 4px;
        }
        .edu-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .edu-school { font-size: 12px; color: var(--text-body); }

        /* Footer */
        .footer { text-align: center; padding: 20px; background: #f8fafc; font-size: 12px; color: var(--primary-light); border-top: 1px solid var(--border-light); }

        /* Loading */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 0; }
            .container { border-radius: 0; box-shadow: none; }
            .header { padding: 32px 20px; }
            .main { padding: 24px 20px; }
            .skills-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }
        
        /* Print Optimization */
        @media print {
            body { background: white; padding: 0; -webkit-print-color-adjust: exact; }
            .container { box-shadow: none; max-width: 100%; width: 100%; border: none; }
            .header { border-bottom: 2px solid #000; }
            .profile-photo { border-color: #fff; box-shadow: none; }
            .cert-content { max-height: none !important; display: block !important; }
            .cert-btn { pointer-events: none; }
            #loading { display: none !important; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div style="color: var(--primary-light); font-weight: 500;">Memuat Data...</div>
</div>

<div class="container">
    <!-- Header -->
    <header class="header">
        <div class="profile-wrapper">
            <div class="profile-photo" id="profilePhoto" title="Klik untuk perbesar">
                <i class="fas fa-user" style="font-size: 40px; color: #ccc;"></i>
            </div>
        </div>
        <h1 id="cv-name">Memuat...</h1>
        <h2 id="cv-title">...</h2>
        <div class="contact-bar" id="contact-container"></div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- About -->
        <section class="section">
            <h3 class="section-title"><i class="fas fa-user-circle"></i> Profil Profesional</h3>
            <div class="about-text" id="cv-about"></div>
        </section>

        <!-- Skills (CIRCULAR) -->
        <section class="section" id="skills-section">
            <h3 class="section-title"><i class="fas fa-layer-group"></i> Kompetensi Inti</h3>
            <div class="skills-grid" id="skills-container">
                <!-- Skills injected by JS -->
            </div>
        </section>

        <!-- Experience -->
        <section class="section" id="experience-section">
            <h3 class="section-title"><i class="fas fa-briefcase"></i> Pengalaman Kerja</h3>
            <div id="experience-container"></div>
        </section>

        <!-- Leadership -->
        <section class="section" id="leadership-section">
            <h3 class="section-title"><i class="fas fa-users-cog"></i> Kepemimpinan & Organisasi</h3>
            <div id="leadership-container"></div>
        </section>

        <!-- Education -->
        <section class="section">
            <h3 class="section-title"><i class="fas fa-graduation-cap"></i> Riwayat Pendidikan</h3>
            <div class="edu-grid" id="education-container"></div>
        </section>

        <!-- Certs -->
        <section class="section">
            <h3 class="section-title"><i class="fas fa-certificate"></i> Sertifikasi Profesional</h3>
            <div id="certs-container"></div>
        </section>
    </main>
    
    <footer class="footer">
        &copy; <span id="year"></span> <span id="footer-name"></span>. Dibuat dengan dedikasi untuk pendidikan Indonesia.
    </footer>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzvPn5Oe00fHO5SHQs2vzEESevByUBrfSX8sOLL_o07dwZwW5Rn63SjudRS6Uf23LEK/exec'; 

    // Helper: Case Insensitive Getter
    function getVal(obj, key) {
        if (!obj) return '';
        const foundKey = Object.keys(obj).find(k => k.toLowerCase().trim() === key.toLowerCase().trim());
        return foundKey ? obj[foundKey] : '';
    }

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('year').textContent = new Date().getFullYear();

        if (SCRIPT_URL.includes('MASUKKAN_URL')) {
            alert('URL Script belum disetting!');
            document.getElementById('loading').style.display = 'none';
            return;
        }

        try {
            const response = await fetch(SCRIPT_URL);
            if (!response.ok) throw new Error('Gagal mengambil data');
            const data = await response.json();
            console.log(data);

            renderProfile(data.profile);
            renderSkills(data.skills); // Updated Function
            renderExperienceAndLeadership(data.experience);
            renderEducation(data.education);
            renderCerts(data.certificates);
            renderFooter(data.profile);

            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                animateSkills(); // Trigger Circle Animation
            }, 500);

        } catch (error) {
            console.error(error);
            document.querySelector('#loading div').textContent = "Gagal memuat data.";
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 2000);
        }
    });

    // --- RENDER FUNCTIONS ---

    function renderProfile(profile) {
        const name = getVal(profile, 'Name');
        const title = getVal(profile, 'Title');
        const about = getVal(profile, 'About');
        const email = getVal(profile, 'Email');
        const phone = getVal(profile, 'Phone');
        const location = getVal(profile, 'Location');
        const photoLink = getVal(profile, 'PhotoLink'); // NEW

        if(name) document.getElementById('cv-name').textContent = name;
        if(title) document.getElementById('cv-title').textContent = title;
        if(about) document.getElementById('cv-about').textContent = about;

        // Handle Photo Link
        const profilePhotoEl = document.getElementById('profilePhoto');
        if (photoLink) {
            profilePhotoEl.innerHTML = `<img src="${photoLink}" alt="Profile">`;
            // Add click to open full size
            profilePhotoEl.onclick = () => window.open(photoLink, '_blank');
        }

        const contactContainer = document.getElementById('contact-container');
        let contacts = [];
        if(email) contacts.push({ icon: 'fas fa-envelope', text: email, link: `mailto:${email}` });
        if(phone) contacts.push({ icon: 'fas fa-phone-alt', text: phone, link: `tel:${phone}` });
        if(location) contacts.push({ icon: 'fas fa-map-marker-alt', text: location, link: '#' });

        contactContainer.innerHTML = contacts.map(c => `
            <a href="${c.link}" class="contact-chip"><i class="${c.icon}"></i> ${c.text}</a>
        `).join('');
    }

    // --- UPDATED: CIRCULAR SKILLS RENDER ---
    function renderSkills(skills) {
        const container = document.getElementById('skills-container');
        if(!skills || skills.length === 0) {
            container.innerHTML = '<p style="font-size:13px; color:#999;">Data tidak tersedia.</p>';
            return;
        }

        const grouped = {};
        skills.forEach(s => {
            const cat = getVal(s, 'Category') || 'Umum';
            if(!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(s);
        });

        let html = '';
        for (const [category, items] of Object.entries(grouped)) {
            // Category Title (Full Width)
            html += `<div style="grid-column: 1 / -1; margin-top: 20px; margin-bottom: 10px; font-size: 12px; font-weight: 700; color: var(--primary-light); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 5px;">${category}</div>`;
            
            items.forEach(item => {
                const skillName = getVal(item, 'Skill');
                let skillLevelStr = getVal(item, 'Level') || '0%';
                // Extract number from "95%" or "95"
                const skillNum = parseInt(skillLevelStr.replace(/[^0-9]/g, '')) || 0;
                
                // Data attribute for animation
                html += `
                <div class="skill-item-circle">
                    <div class="skill-circle" data-percent="${skillNum}">
                        <span>${skillNum}%</span>
                    </div>
                    <div class="skill-name">${skillName}</div>
                </div>`;
            });
        }
        container.innerHTML = html;
    }

    // --- UPDATED: ANIMATION FOR CIRCLES ---
    function animateSkills() {
        const circles = document.querySelectorAll('.skill-circle');
        circles.forEach(circle => {
            const percent = circle.getAttribute('data-percent');
            // Calculate degrees: (percent / 100) * 360
            const degree = (percent / 100) * 360;
            // Set conic gradient
            circle.style.background = `conic-gradient(var(--accent) ${degree}deg, #e2e8f0 0)`;
        });
    }

    function renderExperienceAndLeadership(experiences) {
        const expContainer = document.getElementById('experience-container');
        const leadContainer = document.getElementById('leadership-container');
        if(!experiences) return;

        let expHtml = ''; let leadHtml = ''; let hasLead = false;

        experiences.forEach(item => {
            const type = (getVal(item, 'Type') || 'Work').toLowerCase();
            const role = getVal(item, 'Role');
            const company = getVal(item, 'Company');
            const date = getVal(item, 'Date');
            const descRaw = getVal(item, 'Description') || '';

            let descHtml = '';
            const points = descRaw.split('|').map(p => p.trim()).filter(p => p);
            if(points.length > 1) {
                descHtml = `<div class="timeline-desc"><ul>${points.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
            } else if (points.length === 1) {
                descHtml = `<div class="timeline-desc">${points[0]}</div>`;
            }

            const htmlBlock = `
                <div class="timeline-item">
                    <div class="timeline-header">
                        <span class="timeline-title">${role}</span>
                        <span class="timeline-date">${date}</span>
                    </div>
                    <div class="timeline-subtitle">${company}</div>
                    ${descHtml}
                </div>`;

            if (type.includes('lead') || type.includes('org') || type.includes('ketua')) {
                leadHtml += htmlBlock; hasLead = true;
            } else {
                expHtml += htmlBlock;
            }
        });

        expContainer.innerHTML = expHtml || '<p style="font-size:13px; color:#999;">Belum ada data.</p>';
        leadContainer.innerHTML = leadHtml;
        if(!hasLead) document.getElementById('leadership-section').style.display = 'none';
    }

    function renderEducation(eduList) {
        const container = document.getElementById('education-container');
        if(!eduList) return;
        container.innerHTML = eduList.map(edu => `
            <div class="edu-card">
                <span class="edu-year">${getVal(edu, 'Year')}</span>
                <div class="edu-title">${getVal(edu, 'Degree')}</div>
                <div class="edu-school">${getVal(edu, 'School')}</div>
            </div>
        `).join('');
    }

    function renderCerts(certs) {
        const container = document.getElementById('certs-container');
        if(!certs || certs.length === 0) {
            container.innerHTML = '<p style="font-size:13px; color:#999;">Belum ada data.</p>';
            return;
        }
        container.innerHTML = certs.map(cert => `
            <div class="cert-item">
                <button class="cert-btn" onclick="toggleCert(this)">
                    <span>${getVal(cert, 'Title')}</span>
                    <span class="cert-arrow"><i class="fas fa-chevron-down"></i></span>
                </button>
                <div class="cert-content">
                    <div class="cert-inner">
                        ${renderCertDetails(getVal(cert, 'Details'))}
                        ${getVal(cert, 'Link') ? `<a href="${getVal(cert, 'Link')}" target="_blank" class="cert-link"><i class="fas fa-file-pdf"></i> Lihat Sertifikat</a>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderCertDetails(detailsString) {
        if(!detailsString) return '';
        const lines = detailsString.split('\n');
        return lines.map(line => {
            const parts = line.split(':');
            if(parts.length > 1) {
                return `<div class="cert-row"><span class="cert-label">${parts[0].trim()}:</span> <span>${parts.slice(1).join(':').trim()}</span></div>`;
            }
            return `<div style="margin-bottom:4px;">${line}</div>`;
        }).join('');
    }

    function renderFooter(profile) {
        const name = getVal(profile, 'Name');
        if(name) document.getElementById('footer-name').textContent = name;
    }

    function toggleCert(btn) {
        const allBtns = document.querySelectorAll('.cert-btn');
        allBtns.forEach(otherBtn => {
            if (otherBtn !== btn && otherBtn.classList.contains('active')) {
                otherBtn.classList.remove('active');
                otherBtn.nextElementSibling.style.maxHeight = null;
            }
        });
        btn.classList.toggle('active');
        const content = btn.nextElementSibling;
        content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
    }
</script>

</body>
</html>
