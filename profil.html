<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <!-- Preconnect untuk mempercepat koneksi ke Google Script -->
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Palette Modern Emerald & Slate */
            --primary: #0f172a;       /* Dark Slate for Headings */
            --primary-light: #334155; /* Softer Slate for sub-text */
            --accent: #10b981;        /* Modern Emerald Green */
            --accent-dark: #059669;   /* Darker Emerald for hover */
            --bg-page: #f1f5f9;       /* Light Grey Page Background */
            --bg-card: #ffffff;       /* White Card */
            --text-body: #475569;     /* Readable body text */
            --border-light: #e2e8f0;  /* Subtle borders */
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-body);
            line-height: 1.7;
            padding: 40px 20px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
        }

        /* Header Design */
        .header {
            background: #ffffff;
            padding: 48px 40px 32px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: var(--radius-full);
            background: #f1f5f9;
            border: 4px solid white;
            box-shadow: var(--shadow-md);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .profile-photo:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .profile-photo::after {
            content: 'Ganti';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 10px;
            padding: 4px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .profile-photo:hover::after { opacity: 1; }
        .profile-photo img { width: 100%; height: 100%; object-fit: cover; }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
        }

        /* Contact Chips */
        .contact-bar { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

        .contact-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f8fafc;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            color: var(--primary-light);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .contact-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #ecfdf5;
            transform: translateY(-1px);
        }

        .contact-chip i { font-size: 14px; color: var(--accent); }

        /* Main Content */
        .main { padding: 40px; }
        @media (min-width: 768px) { .main { padding: 40px 60px; } }

        .section { margin-bottom: 40px; }

        /* Section Titles */
        .section-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        .section-title i {
            background: #ecfdf5;
            color: var(--accent);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 12px;
        }

        /* About */
        .about-text {
            font-size: 14px;
            color: var(--text-body);
            text-align: justify;
            background: #f8fafc;
            padding: 24px;
            border-radius: var(--radius-md);
            border-left: 4px solid var(--accent);
            white-space: pre-line;
        }

        /* =========================================
           UPDATED SKILLS SECTION (CIRCULAR CHARTS)
           ========================================= */
        .skill-category { margin-bottom: 30px; }
        .skill-category-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-light);
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            padding-left: 8px;
            border-left: 3px solid var(--accent);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .skill-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: white;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .skill-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            border-color: var(--accent);
        }

        .circular-chart {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) var(--degrees, 0deg), #e2e8f0 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .circular-chart::after {
            content: "";
            position: absolute;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
        }

        .circular-chart .percentage-text {
            position: relative;
            z-index: 1;
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
        }

        .skill-info { display: flex; flex-direction: column; justify-content: center; }
        .skill-name { 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--primary); 
            line-height: 1.3;
            margin-bottom: 2px;
        }
        .skill-level-text {
            font-size: 11px;
            color: var(--accent);
            font-weight: 600;
        }

        /* Timeline */
        .timeline-item {
            position: relative;
            padding-left: 24px;
            margin-bottom: 24px;
            border-left: 2px solid #f1f5f9;
        }
        .timeline-item:last-child { margin-bottom: 0; border-left-color: transparent; }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            border: 2px solid var(--accent);
            transition: background 0.3s;
        }
        .timeline-item:hover::before { background: var(--accent); }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        .timeline-title { font-size: 15px; font-weight: 700; color: var(--primary); }
        .timeline-date {
            font-size: 11px;
            font-weight: 700;
            color: white;
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .timeline-subtitle { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
        .timeline-desc { font-size: 13px; color: var(--text-body); }
        .timeline-desc ul { list-style-type: none; margin-top: 8px; }
        .timeline-desc li { position: relative; padding-left: 18px; margin-bottom: 4px; }
        .timeline-desc li::before {
            content: '•';
            color: var(--accent);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        /* Accordion Certs */
        .cert-item {
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
            background: white;
            transition: box-shadow 0.2s;
        }
        .cert-item:hover { box-shadow: var(--shadow-sm); }
        .cert-btn {
            width: 100%;
            background: white;
            border: none;
            padding: 16px 20px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .cert-btn:hover { background: #f8fafc; color: var(--accent); }
        .cert-btn.active { background: var(--primary); color: white; }
        .cert-arrow { font-size: 10px; transition: transform 0.3s ease; color: var(--accent); }
        .cert-btn.active .cert-arrow { transform: rotate(180deg); color: white; }
        .cert-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0, 1, 0, 1);
            background: #f8fafc;
        }
        .cert-inner { padding: 20px; font-size: 13px; color: var(--text-body); border-top: 1px solid var(--border-light); }
        .cert-row { display: flex; margin-bottom: 6px; }
        .cert-label { font-weight: 600; color: var(--primary); min-width: 100px; flex-shrink: 0; }
        .cert-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 8px 16px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
        }
        .cert-link:hover { background: var(--accent-dark); }

        /* Education Grid */
        .edu-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 600px) { .edu-grid { grid-template-columns: repeat(2, 1fr); } }
        .edu-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .edu-card:hover { border-color: var(--accent); background: white; box-shadow: var(--shadow-sm); }
        .edu-year {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 6px;
            display: inline-block;
            background: #ecfdf5;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .edu-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .edu-school { font-size: 12px; color: var(--text-body); }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            font-size: 12px;
            color: var(--primary-light);
            border-top: 1px solid var(--border-light);
        }

        /* MODAL / PREVIEW STYLES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 900px; /* Sedikit lebih lebar agar PDF enak dibaca */
            max-height: 90vh;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }

        .modal-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--primary-light);
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px;
        }

        .close-modal-btn:hover { color: #ef4444; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            background: #525659;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            min-height: 400px;
        }

        .modal-body img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            object-fit: contain;
        }

        .modal-body iframe {
            width: 100%;
            height: 85vh; /* Full height for PDF reading */
            border: none;
            display: block;
        }
        
        .fallback-msg {
            padding: 40px;
            text-align: center;
            color: white;
        }

        /* Loading State */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.2s ease-out; /* Transisi cepat */
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile */
        @media (max-width: 600px) {
            body { padding: 0; }
            .container { border-radius: 0; box-shadow: none; }
            .header { padding: 32px 20px; }
            .main { padding: 24px 20px; }
            .contact-bar { gap: 8px; }
            .contact-chip { font-size: 11px; padding: 6px 12px; }
            .timeline-header { flex-direction: column; gap: 4px; }
            .timeline-date { align-self: flex-start; margin-top: 4px; }
            .modal-content { height: 100vh; max-height: 100vh; border-radius: 0; width: 100%; }
            .modal-body iframe { height: 90vh; }
            .skills-grid { grid-template-columns: 1fr; }
        }

        /* Print */
        @media print {
            body { background: white; padding: 0; -webkit-print-color-adjust: exact; }
            .container { box-shadow: none; max-width: 100%; width: 100%; border: none; }
            .header { border-bottom: 2px solid #000; }
            .profile-photo { border-color: #fff; box-shadow: none; }
            .section-title { border-bottom-color: #000; }
            .cert-content { max-height: none !important; display: block !important; }
            .cert-btn { pointer-events: none; }
            .cert-link { display: none; }
            .profile-photo::after { display: none; }
            #loading { display: none !important; }
            .modal-overlay { display: none !important; }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
    <div class="spinner"></div>
    <div style="color: var(--primary-light); font-weight: 500;">Memuat Data...</div>
</div>

<div class="container">
    <!-- Header -->
    <header class="header">
        <div class="profile-wrapper">
            <div class="profile-photo" id="profilePhoto" title="Klik untuk ganti foto">
                <img src="https://i.imgur.com/9EXzjLY.png" alt="Usman Firdaus">
            </div>
        </div>
        <h1 id="cv-name">Memuat...</h1>
        <h2 id="cv-title">...</h2>
        
        <div class="contact-bar" id="contact-container">
            <!-- Contact items injected by JS -->
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">

        <!-- About Section -->
        <section class="section">
            <h3 class="section-title"><i class="fas fa-user-circle"></i> Profil Profesional</h3>
            <div class="about-text" id="cv-about">
                Memuat data profil...
            </div>
        </section>

        <!-- Skills Section -->
        <section class="section" id="skills-section">
            <h3 class="section-title"><i class="fas fa-layer-group"></i> Kompetensi Inti</h3>
            <div id="skills-container">
                <!-- Skills injected by JS -->
            </div>
        </section>

        <!-- Experience Section -->
        <section class="section" id="experience-section">
            <h3 class="section-title"><i class="fas fa-briefcase"></i> Pengalaman Kerja</h3>
            <div id="experience-container">
                <!-- Experience injected by JS -->
            </div>
        </section>

        <!-- Leadership Section -->
        <section class="section" id="leadership-section">
            <h3 class="section-title"><i class="fas fa-users-cog"></i> Kepemimpinan & Organisasi</h3>
            <div id="leadership-container">
                <!-- Leadership injected by JS -->
            </div>
        </section>

        <!-- Education Section -->
        <section class="section">
            <h3 class="section-title"><i class="fas fa-graduation-cap"></i> Riwayat Pendidikan</h3>
            <div class="edu-grid" id="education-container">
                <!-- Education injected by JS -->
            </div>
        </section>

        <!-- Certifications Section -->
        <section class="section">
            <h3 class="section-title"><i class="fas fa-certificate"></i> Sertifikasi Profesional</h3>
            <div id="certs-container">
                <!-- Certs injected by JS -->
            </div>
        </section>
        
        <!-- Achievements (Optional) -->
        <section class="section" id="achievements-section" style="display:none;">
            <h3 class="section-title"><i class="fas fa-trophy"></i> Penghargaan</h3>
            <div id="achievements-container"></div>
        </section>

    </main>
    
    <footer class="footer">
        &copy; <span id="year"></span> <span id="footer-name"></span>. Sayaguru.id
    </footer>
</div>

<!-- MODAL PREVIEW -->
<div class="modal-overlay" id="certModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">
                <i class="fas fa-file-alt" style="color: var(--accent);"></i>
                <span id="modalFileName">Preview Dokumen</span>
            </div>
            <button class="close-modal-btn" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Content injected here -->
        </div>
    </div>
</div>

<script>
    // ==========================================
    // KONFIGURASI
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzvPn5Oe00fHO5SHQs2vzEESevByUBrfSX8sOLL_o07dwZwW5Rn63SjudRS6Uf23LEK/exec'; 

    // --- FUNGSI BANTUAN ---
    function getVal(obj, key) {
        if (!obj) return '';
        const foundKey = Object.keys(obj).find(k => k.toLowerCase().trim() === key.toLowerCase().trim());
        return foundKey ? obj[foundKey] : '';
    }

    // --- FUNGSI KONVERSI URL GOOGLE DRIVE (FIX TAMPILAN PDF/IMG) ---
    // Fungsi ini mengubah link biasa menjadi link yang bisa di-embed
    function getConvertedUrl(url) {
        if (!url) return null;

        // Cek apakah ini link Google Drive
        const driveMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        
        if (driveMatch) {
            const id = driveMatch[1];
            const isImage = url.match(/\.(jpeg|jpg|gif|png|bmp|webp)$/i);
            
            if (isImage) {
                // Untuk Gambar: Gunakan direct link (uc?export=view)
                return { type: 'image', url: `https://drive.google.com/uc?export=view&id=${id}` };
            } else {
                // Untuk PDF / Dokumen lain: Gunakan preview link agar bisa di iframe
                return { type: 'pdf', url: `https://drive.google.com/file/d/${id}/preview` };
            }
        }

        // Jika bukan Google Drive, cek ekstensi file biasa
        const isDirectImage = url.match(/\.(jpeg|jpg|gif|png|bmp|webp)$/i);
        const isDirectPDF = url.match(/\.pdf$/i);

        if (isDirectImage) return { type: 'image', url: url };
        if (isDirectPDF) return { type: 'pdf', url: url };

        return null; // Tidak dikenali
    }

    // --- MODAL LOGIC ---
    function openPreview(url, title) {
        const modal = document.getElementById('certModal');
        const modalBody = document.getElementById('modalBody');
        const modalTitle = document.getElementById('modalFileName');
        
        modalTitle.textContent = title || "Dokumen";
        modalBody.innerHTML = ''; 

        const converted = getConvertedUrl(url);

        if (converted && converted.type === 'image') {
            const img = document.createElement('img');
            img.src = converted.url;
            img.alt = title;
            img.style.maxHeight = "80vh";
            modalBody.appendChild(img);
        } 
        else if (converted && converted.type === 'pdf') {
            const iframe = document.createElement('iframe');
            iframe.src = converted.url;
            // Tambahkan atribut agar browser mengizinkan script di dalam iframe (jika perlu)
            // untuk Drive preview ini biasanya aman.
            modalBody.appendChild(iframe);
        } 
        else {
            // Fallback jika link tidak bisa di-preview
            modalBody.innerHTML = `
                <div class="fallback-msg">
                    <i class="fas fa-exclamation-triangle" style="font-size: 40px; margin-bottom: 15px;"></i>
                    <p>Pratinjau otomatis tidak tersedia untuk tautan ini.</p>
                    <a href="${url}" target="_blank" style="color:var(--accent); font-weight:bold; text-decoration:underline;">Buka di Tab Baru</a>
                </div>
            `;
        }

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const modal = document.getElementById('certModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }

    document.getElementById('certModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === "Escape") closeModal();
    });


    // --- FUNGSI UTAMA ---
    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('year').textContent = new Date().getFullYear();

        if (SCRIPT_URL.includes('MASUKKAN_URL')) {
            alert('Mohon atur URL Google Apps Script.');
            document.getElementById('loading').style.display = 'none';
            return;
        }

        try {
            const response = await fetch(SCRIPT_URL);
            if (!response.ok) throw new Error('Gagal mengambil data');
            const data = await response.json();

            // Render Data
            renderProfile(data.profile);
            renderSkills(data.skills); 
            renderExperienceAndLeadership(data.experience);
            renderEducation(data.education);
            renderCerts(data.certificates);
            renderFooter(data.profile);

            // Hapus Loading SEGERA setelah data siap (Loading Cepat)
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                animateCircles(); 
            }, 200); // Hanya 200ms untuk efek fade out halus

        } catch (error) {
            console.error('Error:', error);
            document.querySelector('#loading div').textContent = "Gagal memuat data. Cek koneksi internet.";
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 2000);
        }
    });

    // --- FUNGSI RENDER SKILLS ---
    function renderSkills(skills) {
        const container = document.getElementById('skills-container');
        if(!skills || skills.length === 0) {
            container.innerHTML = '<p style="font-size:13px; color:#999;">Belum ada data skill.</p>';
            return;
        }

        const grouped = {};
        skills.forEach(s => {
            const cat = getVal(s, 'Category') || 'Umum';
            if(!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(s);
        });

        let html = '';
        for (const [category, items] of Object.entries(grouped)) {
            html += `
            <div class="skill-category">
                <div class="skill-category-title">${category}</div>
                <div class="skills-grid">
            `;
            
            items.forEach(item => {
                const skillName = getVal(item, 'Skill');
                let rawLevel = getVal(item, 'Level');
                
                let percentVal = 0;
                // Cek format desimal (0.95) dari Google Sheets
                if (typeof rawLevel === 'number' && rawLevel > 0 && rawLevel < 1) {
                    percentVal = Math.round(rawLevel * 100);
                } else {
                    // Cek format string ("95%")
                    const cleaned = String(rawLevel).replace('%', '').replace(',', '.').trim();
                    const parsed = parseFloat(cleaned);
                    if (!isNaN(parsed)) {
                        percentVal = parsed < 1 ? Math.round(parsed * 100) : Math.round(parsed);
                    }
                }
                
                if(percentVal > 100) percentVal = 100;
                if(percentVal < 0) percentVal = 0;

                const degrees = Math.round(percentVal * 3.6);

                html += `
                <div class="skill-card">
                    <div class="circular-chart" style="--degrees: ${degrees}deg;">
                        <span class="percentage-text">${percentVal}%</span>
                    </div>
                    <div class="skill-info">
                        <div class="skill-name">${skillName}</div>
                        <div class="skill-level-text">Expertise Level</div>
                    </div>
                </div>`;
            });

            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    // --- Fungsi Render Lainnya ---

    function renderProfile(profile) {
        const name = getVal(profile, 'Name');
        const title = getVal(profile, 'Title');
        const about = getVal(profile, 'About');
        const email = getVal(profile, 'Email');
        const phone = getVal(profile, 'Phone');
        const location = getVal(profile, 'Location');

        if(name) document.getElementById('cv-name').textContent = name;
        if(title) document.getElementById('cv-title').textContent = title;
        if(about) document.getElementById('cv-about').textContent = about;

        const contactContainer = document.getElementById('contact-container');
        let contacts = [];
        if(email) contacts.push({ icon: 'fas fa-envelope', text: email, link: `mailto:${email}` });
        if(phone) contacts.push({ icon: 'fas fa-phone-alt', text: phone, link: `tel:${phone}` });
        if(location) contacts.push({ icon: 'fas fa-map-marker-alt', text: location, link: '#' });

        contactContainer.innerHTML = contacts.map(c => `
            <a href="${c.link}" class="contact-chip"><i class="${c.icon}"></i> ${c.text}</a>
        `).join('');
    }

    function renderExperienceAndLeadership(experiences) {
        const expContainer = document.getElementById('experience-container');
        const leadContainer = document.getElementById('leadership-container');
        
        if(!experiences) return;

        let expHtml = '';
        let leadHtml = '';
        let hasLead = false;

        experiences.forEach(item => {
            const type = (getVal(item, 'Type') || 'Work').toLowerCase();
            const role = getVal(item, 'Role');
            const company = getVal(item, 'Company');
            const date = getVal(item, 'Date');
            const descRaw = getVal(item, 'Description') || '';

            let descHtml = '';
            const points = descRaw.split('|').map(p => p.trim()).filter(p => p);
            if(points.length > 1) {
                descHtml = `<div class="timeline-desc"><ul>${points.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
            } else if (points.length === 1) {
                descHtml = `<div class="timeline-desc">${points[0]}</div>`;
            }

            const htmlBlock = `
                <div class="timeline-item">
                    <div class="timeline-header">
                        <span class="timeline-title">${role}</span>
                        <span class="timeline-date">${date}</span>
                    </div>
                    <div class="timeline-subtitle">${company}</div>
                    ${descHtml}
                </div>
            `;

            if (type.includes('lead') || type.includes('org') || type.includes('ketua')) {
                leadHtml += htmlBlock;
                hasLead = true;
            } else {
                expHtml += htmlBlock;
            }
        });

        expContainer.innerHTML = expHtml || '<p style="font-size:13px; color:#999;">Belum ada data pengalaman.</p>';
        leadContainer.innerHTML = leadHtml;
        
        if(!hasLead) document.getElementById('leadership-section').style.display = 'none';
    }

    function renderEducation(eduList) {
        const container = document.getElementById('education-container');
        if(!eduList || eduList.length === 0) return;

        container.innerHTML = eduList.map(edu => `
            <div class="edu-card">
                <span class="edu-year">${getVal(edu, 'Year')}</span>
                <div class="edu-title">${getVal(edu, 'Degree')}</div>
                <div class="edu-school">${getVal(edu, 'School')}</div>
            </div>
        `).join('');
    }

    function renderCerts(certs) {
        const container = document.getElementById('certs-container');
        if(!certs || certs.length === 0) {
            container.innerHTML = '<p style="font-size:13px; color:#999;">Belum ada data sertifikasi.</p>';
            return;
        }

        container.innerHTML = certs.map((cert, index) => {
            const certTitle = getVal(cert, 'Title');
            const certLink = getVal(cert, 'Link');
            const linkButton = certLink 
                ? `<button type="button" class="cert-link" onclick="openPreview('${certLink}', '${certTitle.replace(/'/g, "\\'")}')">
                     <i class="fas fa-eye"></i> Lihat Sertifikat
                   </button>` 
                : '';

            return `
            <div class="cert-item">
                <button class="cert-btn" onclick="toggleCert(this)">
                    <span>${certTitle}</span>
                    <span class="cert-arrow"><i class="fas fa-chevron-down"></i></span>
                </button>
                <div class="cert-content">
                    <div class="cert-inner">
                        ${renderCertDetails(getVal(cert, 'Details'))}
                        ${linkButton}
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    function renderCertDetails(detailsString) {
        if(!detailsString) return '';
        const lines = detailsString.split('\n');
        return lines.map(line => {
            const parts = line.split(':');
            if(parts.length > 1) {
                const label = parts[0].trim();
                const val = parts.slice(1).join(':').trim();
                return `<div class="cert-row"><span class="cert-label">${label}:</span> <span>${val}</span></div>`;
            }
            return `<div style="margin-bottom:4px;">${line}</div>`;
        }).join('');
    }

    function renderFooter(profile) {
        const name = getVal(profile, 'Name');
        if(name) document.getElementById('footer-name').textContent = name;
    }

    // --- Animasi & Interaksi ---
    function animateCircles() {
        const circles = document.querySelectorAll('.circular-chart');
        circles.forEach(circle => {
            const targetDegrees = circle.style.getPropertyValue('--degrees');
            circle.style.setProperty('--degrees', '0deg');
            void circle.offsetWidth; 
            setTimeout(() => {
                circle.style.transition = '--degrees 1.5s ease-out';
                circle.style.setProperty('--degrees', targetDegrees);
            }, 50);
        });
    }

    function toggleCert(btn) {
        const allBtns = document.querySelectorAll('.cert-btn');
        allBtns.forEach(otherBtn => {
            if (otherBtn !== btn && otherBtn.classList.contains('active')) {
                otherBtn.classList.remove('active');
                otherBtn.nextElementSibling.style.maxHeight = null;
            }
        });
        btn.classList.toggle('active');
        const content = btn.nextElementSibling;
        if (content.style.maxHeight) {
            content.style.maxHeight = null;
        } else {
            content.style.maxHeight = content.scrollHeight + "px";
        }
    }

    // Photo Upload Logic
    const profilePhoto = document.getElementById('profilePhoto');
    profilePhoto.addEventListener('click', function() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => {
            const file = e.target.files[0];
            if(file){
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.alt = "Profile Photo";
                    profilePhoto.innerHTML = ''; profilePhoto.appendChild(img);
                    profilePhoto.style.borderColor = "var(--accent)";
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });
</script>
